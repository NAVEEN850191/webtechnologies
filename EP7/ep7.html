<!DOCTYPE html>
<html>
<head>
<title>Student Management Table</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, rgb(92, 61, 232), rgb(186, 109, 225));
    display:flex;
    justify-content:center;
    align-items:center;
    height:90vh;
}

.container{
width:70%;
margin:auto;
background:rgb(215, 229, 232);
padding:20px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
text-align:center;
}

input,select,button{
padding:8px;
margin:10px;
border-radius:5px;
border:1px solid gray;
}

button{
background:#ccdee0;
color:white;
cursor:pointer;
}

button:hover{
background:#d0dee1;
}

table{
width:75%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#55c5e4;
color:white;
}

#result{
margin-top:15px;
font-weight:bold;
color:green;
}
</style>

</head>

<body>

<div class="container">

<h1>Student Management System</h1>

<input type="text" id="search" placeholder="Search Student Name">

<select id="courseFilter">
<option value="All">All Courses</option>
<option value="CSE">CSE</option>
<option value="AI">AI</option>
<option value="SE">SE</option>
</select>

<button onclick="sortMarks()">Sort By Marks</button>
<button onclick="maxmarks()">Maximum Marks</button>

<table id="studentTable">

<thead>
<tr>
<th>Name</th>
<th>Marks</th>
<th>Course</th>
</tr>
</thead>

<tbody>

<tr>
<td>Naveen</td>
<td>85</td>
<td>CSE</td>
</tr>

<tr>
<td>Ravi</td>
<td>92</td>
<td>SE</td>
</tr>

<tr>
<td>Rohit</td>
<td>65</td>
<td>SE</td>
</tr>

<tr>
<td>Datta</td>
<td>75</td>
<td>AI</td>
</tr>

<tr>
<td>Vikram</td>
<td>70</td>
<td>AI</td>
</tr>

<tr>
<td>John</td>
<td>88</td>
<td>CSE</td>
</tr>

<tr>
<td>Arjun</td>
<td>76</td>
<td>SE</td>
</tr>

</tbody>

</table>

<p id="result"></p>

</div>

<script>

const searchInput = document.getElementById("search");
const filter = document.getElementById("courseFilter");
const table = document.getElementById("studentTable").getElementsByTagName("tbody")[0];

searchInput.addEventListener("keyup", filterTable);
filter.addEventListener("change", filterTable);

function filterTable(){

let searchValue = searchInput.value.toLowerCase();
let courseValue = filter.value;

let rows = table.getElementsByTagName("tr");

for(let i=0;i<rows.length;i++){

let name = rows[i].cells[0].textContent.toLowerCase();
let course = rows[i].cells[2].textContent;

let nameMatch = name.includes(searchValue);
let courseMatch = (courseValue === "All" || course === courseValue);

if(nameMatch && courseMatch){
rows[i].style.display="";
}
else{
rows[i].style.display="none";
}

}

}

function sortMarks(){

let rows = Array.from(table.rows);

rows.sort(function(a,b){
return b.cells[1].textContent - a.cells[1].textContent;
});

rows.forEach(row => table.appendChild(row));

}

function maxmarks(){

let rows = table.getElementsByTagName("tr");
let max = -1;
let student = "";
let course = "";

for(let i=0;i<rows.length;i++){

let marks = parseInt(rows[i].cells[1].textContent);

if(marks > max){
max = marks;
student = rows[i].cells[0].textContent;
course = rows[i].cells[2].textContent;
}

}

document.getElementById("result").innerHTML =
"Student with Maximum Marks: " + student + " | Marks: " + max + " | Course: " + course;

}

</script>

</body>
</html>
