<!DOCTYPE html>
<html>
<head>
<title>Contact Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, purple, violet);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:350px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.submit{
    background: linear-gradient(to right, blue, purple);
}

.clear{
    background:green;
    margin-top:10px;
}

.output{
    margin-top:20px;
}
</style>

</head>

<body>

<div class="container">

<h2>Contact Form</h2>

<label>Name</label>
<input type="text" id="name">

<label>Email</label>
<input type="email" id="email">

<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Message</label>
<textarea id="message"></textarea>

<button class="submit" onclick="submitForm()">Submit</button>

<div class="output" id="result"></div>

<button class="clear" onclick="clearData()">Clear Data</button>

</div>

<script>

function submitForm(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let gender=document.getElementById("gender").value;
let message=document.getElementById("message").value;

document.getElementById("result").innerHTML=
"<p><b>Name:</b> "+name+"</p>"+
"<p><b>Email:</b> "+email+"</p>"+
"<p><b>Gender:</b> "+gender+"</p>"+
"<p><b>Message:</b> "+message+"</p>";
}

function clearData(){

document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("message").value="";
document.getElementById("result").innerHTML="";

}

</script>

</body>
</html>
